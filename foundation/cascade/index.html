<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix the cascade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p class="para">I'm just a paragraph with extra bold text!</p>
    <p class="para small-para">I'm smaller paragraph, also with extra bold text!</p>

    <button id="confirm-buttom" class="button confirm">Confirm</button>
    <button id="cancel-buttom" class="button cancel">Cancel</button>

    <div class="text">I'm a div with thin text!</div>
    <div class="text">I'm a div with thin text and a child div!
        <div class="text child">I'm smaller child div with extra bold text</div>
    </div>
</body>
</html>
